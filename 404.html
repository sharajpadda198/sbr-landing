<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FarmConnect</title>
    <script>
      ;(function () {
        var l = window.location
        var base = l.pathname.split("/")[1]
        if (!base) {
          l.replace(l.origin + "/")
          return
        }
        l.replace(l.origin + "/" + base + "/#" + l.pathname + l.search + l.hash)
      })()
    </script>
  </head>
  <body></body>
</html>
